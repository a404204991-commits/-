edition: 1.0.0
name: my-design-app
access: default
services:
  framework:
    component: fc
    # === 关键修改：添加 build 配置块 ===
    build:
      # 使用 npm 构建（会自动识别 package.json）
      builder: npm
      # 构建命令：先安装依赖，再打包
      script: 
        - npm install
        - npm run build

    props:
      region: cn-shanghai
      service:
        name: serverless-devs-application
      function:
        name: design-vocabulary
        description: React App on FC
        runtime: nodejs18  # 推荐使用较新的 Node 版本
        # === 关键修改：codeUri 指向构建后的目录 ===
        codeUri: ./dist
        # 注意：这里去掉了 customRuntimeConfig，因为我们用的是静态托管模式
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - PATCH
