edition: 1.0.0
name: my-design-app
access: default
services:
  framework:
    component: fc
    props:
      region: cn-shanghai
      service:
        name: serverless-devs-application
      function:
        name: design-vocabulary
        description: React App on FC
        # 修改点1: 使用 Node.js 官方运行时，而不是自定义运行时
        runtime: nodejs18
        # 修改点2: 指定环境变量，告诉构建工具我们是在生产环境
        environmentVariables:
          NODE_ENV: production
        # 修改点3: 指向构建后的目录，而不是当前目录
        codeUri: ./dist
        # 修改点4: 移除自定义的 command/args，使用默认的 Node.js 入口
        # 这里假设你有一个 index.js 作为入口，或者直接指向 index.html
        # 如果只是纯静态网站，通常不需要 customRuntimeConfig
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - PATCH
