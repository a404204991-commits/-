# 室内设计语汇库 - 阿里云 FC 配置文件
edition: 3.0.0
name: interior-vocabulary-app
vars:
  region: "cn-shanghai" # 确保和你创建应用时选的区域一致

resources:
  vocabulary_function:
    component: fc3
    props:
      region: ${vars.region}
      handler: index.handler
      runtime: nodejs20
      description: '室内设计语汇库 Web 应用'
      cpu: 0.5
      memory: 512
      timeout: 60
      # 【核心改动】将代码目录设为当前根目录，这样阿里云就能看到 package.json 和 server.cjs
      code: ./ 
      customRuntimeConfig:
        # 【核心改动】直接在这里指定启动命令，优先级最高
        command:
          - node
        args:
          - server.cjs
        port: 9000
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
