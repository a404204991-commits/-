edition: 1.0.0
name: interior-vocabulary
access: default

services:
  web:
    component: fc
    # 关键：强制在云端构建
    hooks:
      pre-deploy:
        - npm install
        - npm run build  # 生成 dist 目录

    props:
      region: cn-shanghai
      service:
        name: serverless-devs-application
      function:
        name: design-vocabulary
        runtime: nodejs18  # 必须用 Node.js 18+
        codeUri: ./        # 上传整个项目（包含 server.cjs 和 dist）
        # 指向你的服务器入口文件
        customRuntimeConfig:
          entryFile: server.cjs
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods: [GET, POST, PUT, DELETE, HEAD]
