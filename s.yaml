edition: 1.0.0
name: interior-vocabulary
access: default

services:
  web:
    component: fc
    props:
      region: cn-shanghai
      service:
        name: serverless-devs-application
        description: Serverless Devs Web Service
      function:
        name: design-vocabulary
        description: Vite App deployed on FC
        runtime: custom-debian10
        # 关键修改1：指向源码根目录
        codeUri: ./
        # 关键修改2：启动命令
        customRuntimeConfig:
          command:
            - node
          args:
            - server.cjs
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
      # 关键修改3：明确告诉组件如何构建
    hooks:
      pre-deploy:
        - npm install
        - npm run build
